<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLUB MEMBERSHIP FORM</title>
</head>
<body>

<fieldset>
<h1>YOUR CLUB <br> <span>Membership Form</span></h1>

        <label for="number">FORM NUMBER</label><br>
        <input type="number" name="number" id="number">

</fieldset>
<p>Please fill out the form truthfully</p>
<form>
<label for="text">MR/MS/MISS</label>
<input type="text" name="text" id="text">


<label for="firstname">FIRST NAME</label>
<input type="text" name="text" id="firstname" required>


<label for="lastname">LAST NAME</label>
<input type="text" name="text" id="lastname" required><br>

    <label for="date">DATE OF BIRTH (DD/MM/YYYY)</label>
    <input type="date" name="date" id="date" required>

    <label for="phone">PHONE NUMBER</label>
    <input type="number" name="number" id="phone" required>

    <label for="address">ADDRESS)</label>
    <input type="text"name="address" id="address" required><br>

    <label for="country">COUNTRY</label>
    <input type="text" name="country" id="country" required>

    <label for="nationality">NATIONALITY</label>
    <input type="text" name="nationality" id="nationality" required>

    <label for="email">EMAIL</label>
    <input type="email" name="email" id="email" required><br>


    <label for="sport">SELECT SPORT</label>
    <select name="sport" id="sport">
        <option value="football" selected>football</option>
        <option value="basketball">basketball</option>
        <option value="volleyball">volleyball</option>
        <option value="tennis" >table tennis</option>
    </select>

    <p>HAVE YOU BEEN A MEMBER OF THE CLUB PREVIOUSLY?IF YES, PLEASE MENTION THE PERIOD</p>
    <label for="startdate">START DATE</label>
    <input type="date" name="date" id="startdate" placeholder="START DATE"><br>
    <label for="enddate">END DATE</label>
    <input type="date" name="date" id="enddate" placeholder="END DATE"><br>



</form>


</body>
</html>
