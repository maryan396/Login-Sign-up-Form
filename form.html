<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLUB MEMBERSHIP FORM</title>
</head>
<body>

<fieldset>
<h1>YOUR CLUB <br> <span>Membership Form</span></h1>

        <label for="number">FORM NUMBER</label><br>
        <input type="number" name="number" id="number">

</fieldset>
<p>Please fill out the form truthfully</p>
<form>
<label for="text">MR/MS/MISS</label>
<input type="text" name="text" id="text">


<label for="firstname">FIRST NAME</label>
<input type="text" name="text" id="firstname" required>


<label for="lastname">LAST NAME</label>
<input type="text" name="text" id="lastname" required>

    <label for="date">DATE OF BIRTH (DD/MM/YYYY)</label>
    <input type="date" name="date" id="date" required>

</form>


</body>
</html>
